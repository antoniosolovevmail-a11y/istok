<style>
:root{
  --bg:#F7F9F8;--bg2:#EFF5F2;--white:#FFFFFF;
  --accent:#0A7A5F;--accent2:#0C9470;--accent-lt:#E6F5F0;--accent-md:#B3DDD2;
  --text:#152620;--text-muted:#4A7060;--text-dim:#8AADA0;
  --border:#D8EDE6;--border-dk:#B0D4C8;
  --shadow:0 2px 16px rgba(10,122,95,0.08);--shadow-lg:0 8px 48px rgba(10,122,95,0.13);
  --font-head:"Syne",sans-serif;--font-body:"Nunito Sans",sans-serif;
  --r:10px;--rl:18px;--rxl:28px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:16px;line-height:1.7;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}
button{font-family:var(--font-body);cursor:pointer;}
body::before{content:\'\';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(10,122,95,0.05) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}
.container{max-width:1120px;margin:0 auto;padding:0 32px;position:relative;z-index:1;}
.section{padding:96px 0;}.section-alt{background:var(--bg2);}
/* reveal handled below */
._placeholder{display:none;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
.eyebrow::before{content:\'\';width:20px;height:2px;background:var(--accent);border-radius:2px;}
h1,h2,h3{font-family:var(--font-head);letter-spacing:-.4px;line-height:1.18;}
h1{font-size:clamp(34px,4.2vw,56px);font-weight:800;}
h2{font-size:clamp(26px,3vw,40px);font-weight:700;}
h3{font-size:18px;font-weight:700;}
.accent-text{color:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:var(--r);font-size:15px;font-weight:700;font-family:var(--font-body);border:none;cursor:pointer;transition:all .22s ease;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(10,122,95,.28);}
.btn-outline{background:transparent;color:var(--accent);border:2px solid var(--accent);}
.btn-outline:hover{background:var(--accent-lt);}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(247,249,248,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;max-width:1120px;margin:0 auto;}
.nav-logo{font-family:var(--font-head);font-size:22px;font-weight:800;letter-spacing:-.5px;}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;align-items:center;gap:28px;}
.nav-link{font-size:14px;font-weight:600;color:var(--text-muted);transition:color .2s;}
.nav-link:hover{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:14px;}
.nav-phone{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--text);transition:color .2s;}
.nav-phone:hover{color:var(--accent);}
.phone-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.hero{padding:72px 0 0;overflow:hidden;}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding-bottom:72px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px 6px 8px;background:var(--accent-lt);border:1px solid var(--accent-md);border-radius:100px;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:22px;}
.hero-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;}
.hero h1{margin-bottom:20px;}
.hero-sub{font-size:17px;font-weight:300;color:var(--text-muted);line-height:1.75;margin-bottom:34px;max-width:500px;}
.hero-btns{display:flex;gap:12px;margin-bottom:40px;flex-wrap:wrap;}
.hero-trust{display:flex;flex-wrap:wrap;gap:10px 22px;}
.trust-item{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--text-muted);}
.trust-check{width:20px;height:20px;border-radius:50%;background:var(--accent-lt);border:1.5px solid var(--accent-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.trust-check svg{width:10px;height:10px;stroke:var(--accent);fill:none;stroke-width:2.5;}
.hero-img-col{position:relative;}
.hero-stat-chip{position:absolute;top:28px;right:-12px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;box-shadow:var(--shadow);text-align:center;z-index:2;}
.hero-stat-chip-val{font-family:var(--font-head);font-size:26px;font-weight:800;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums;}
.hero-stat-chip-label{font-size:11px;font-weight:600;color:var(--text-muted);margin-top:3px;}
.hero-image-wrap{border-radius:var(--rxl);overflow:hidden;box-shadow:var(--shadow-lg);aspect-ratio:4/5;}
.hero-image-wrap img{width:100%;height:100%;object-fit:cover;}
.hero-img-card{position:absolute;bottom:28px;left:28px;right:28px;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.hero-img-card-icon{width:42px;height:42px;border-radius:50%;background:var(--accent-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hero-img-card-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.5;}
.hero-img-card-title{font-weight:700;font-size:13px;color:var(--text);}
.hero-img-card-sub{font-size:12px;color:var(--text-muted);}

/* QUIZ */
.quiz-section{padding:80px 0;background:var(--text);position:relative;overflow:hidden;}
.quiz-section::before{content:\'\';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
.quiz-header{text-align:center;margin-bottom:48px;}
.quiz-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent-md);margin-bottom:14px;}
.quiz-eyebrow::before{content:\'\';width:20px;height:2px;background:var(--accent-md);border-radius:2px;}
.quiz-title{font-family:var(--font-head);font-size:clamp(26px,3vw,40px);font-weight:800;color:#fff;margin-bottom:12px;}
.quiz-subtitle{font-size:16px;font-weight:300;color:rgba(255,255,255,.55);max-width:540px;margin:0 auto;}
.quiz-box{background:var(--white);border-radius:var(--rxl);padding:48px;max-width:760px;margin:0 auto;box-shadow:0 24px 80px rgba(0,0,0,.2);position:relative;}
.quiz-progress-wrap{margin-bottom:32px;}
.quiz-progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.quiz-progress-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;}
.quiz-progress-count{font-size:12px;font-weight:700;color:var(--accent);}
.quiz-progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}
.quiz-step{display:none;}
.quiz-step.active{display:block;}
.quiz-question{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3;}
.quiz-hint{font-size:14px;font-weight:300;color:var(--text-muted);margin-bottom:28px;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.quiz-option{padding:16px 18px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;background:var(--bg);text-align:left;font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--text);line-height:1.45;}
.quiz-option:hover{border-color:var(--accent-md);background:var(--accent-lt);}
.quiz-option.selected{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);}
.quiz-option-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:var(--accent-lt);border:1.5px solid var(--accent-md);margin-bottom:8px;flex-shrink:0;transition:all .2s;}
.quiz-option-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.7;transition:all .2s;}
.quiz-option.selected .quiz-option-icon{background:var(--accent);border-color:var(--accent);}
.quiz-option.selected .quiz-option-icon svg{stroke:#fff;}
.quiz-option:hover .quiz-option-icon{background:var(--accent-md);border-color:var(--accent);}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;}
.quiz-btn-back{background:transparent;border:1.5px solid var(--border);color:var(--text-muted);padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;}
.quiz-btn-back:hover{border-color:var(--border-dk);color:var(--text);}
.quiz-btn-next{background:var(--accent);color:#fff;border:none;padding:13px 28px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;gap:8px;}
.quiz-btn-next:hover{background:var(--accent2);transform:translateY(-1px);}
.quiz-btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.quiz-result{display:none;text-align:center;}
.quiz-result.active{display:block;}
.result-icon{width:80px;height:80px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:36px;}
.result-level{font-family:var(--font-head);font-size:26px;font-weight:800;margin-bottom:12px;}
.result-desc{font-size:15px;font-weight:300;color:var(--text-muted);line-height:1.7;margin-bottom:28px;max-width:500px;margin-left:auto;margin-right:auto;}
.result-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px;}
.result-tag{padding:6px 14px;border-radius:100px;font-size:13px;font-weight:600;}
.result-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.result-reset{background:transparent;border:1.5px solid var(--border);color:var(--text-muted);padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;}
.result-reset:hover{border-color:var(--border-dk);color:var(--text);}

/* PAIN */
.pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px;}
.pain-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:28px 24px;box-shadow:var(--shadow);transition:all .3s;position:relative;overflow:hidden;}
.pain-card::before{content:\'\';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transition:transform .3s;transform-origin:left;}
.pain-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.pain-card:hover::before{transform:scaleX(1);}
.pain-num{font-family:var(--font-head);font-size:60px;font-weight:800;color:var(--accent-lt);line-height:.9;margin-bottom:12px;font-variant-numeric:tabular-nums;}
.pain-text{font-size:15px;font-weight:300;color:var(--text-muted);line-height:1.65;font-style:italic;}
.pain-footer{margin-top:44px;text-align:center;font-size:18px;font-weight:600;color:var(--text);}
.pain-footer em{color:var(--accent);font-style:normal;}

/* SECURITY */
.security-inner{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start;margin-top:56px;}
.security-img-wrap{position:relative;border-radius:var(--rxl);overflow:hidden;box-shadow:var(--shadow-lg);aspect-ratio:3/4;}
.security-img-wrap img{width:100%;height:100%;object-fit:cover;}
.security-badge{position:absolute;bottom:28px;left:28px;background:var(--white);border-radius:var(--rl);padding:20px 24px;box-shadow:var(--shadow-lg);}
.security-badge-num{font-family:var(--font-head);font-size:42px;font-weight:800;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums;}
.security-badge-text{font-size:13px;font-weight:600;color:var(--text-muted);margin-top:4px;}
.security-intro{font-size:16px;font-weight:300;color:var(--text-muted);line-height:1.75;margin-bottom:32px;}
.sec-step{display:flex;gap:18px;padding:18px 0;border-bottom:1px solid var(--border);}
.sec-step:last-child{border-bottom:none;}
.sec-num-wrap{width:36px;height:36px;border-radius:50%;background:var(--accent-lt);border:1.5px solid var(--accent-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sec-num{font-family:var(--font-head);font-size:13px;font-weight:800;color:var(--accent);}
.sec-title{font-size:15px;font-weight:700;margin-bottom:3px;}
.sec-desc{font-size:14px;font-weight:300;color:var(--text-muted);line-height:1.6;}
.sec-note{margin-top:28px;padding:18px 22px;background:var(--accent-lt);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;font-size:14px;color:var(--text-muted);line-height:1.65;}
.sec-note strong{color:var(--text);}

/* SERVICES */
.services-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:48px;}
.service-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);transition:all .3s;}
.service-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);}
.service-img{width:100%;height:200px;object-fit:cover;}
.service-body{padding:24px 26px;}
.service-tag{display:inline-block;padding:4px 12px;background:var(--accent-lt);border-radius:100px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;}
.service-title{font-size:18px;font-weight:700;margin-bottom:8px;font-family:var(--font-head);}
.service-desc{font-size:14px;font-weight:300;color:var(--text-muted);line-height:1.65;margin-bottom:18px;}
.service-link{font-size:13px;font-weight:700;color:var(--accent);display:inline-flex;align-items:center;gap:5px;transition:gap .2s;}
.service-card:hover .service-link{gap:10px;}
.urgent-bar{margin-top:24px;display:flex;align-items:center;justify-content:space-between;padding:22px 32px;background:var(--text);border-radius:var(--rl);gap:16px;flex-wrap:wrap;}
.urgent-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;}
.urgent-sub{font-size:13px;color:rgba(255,255,255,.55);}
.btn-urgent{background:var(--accent);color:#fff;border:none;padding:12px 24px;font-size:14px;font-weight:700;border-radius:var(--r);cursor:pointer;font-family:var(--font-body);transition:all .2s;white-space:nowrap;}
.btn-urgent:hover{background:var(--accent2);}

/* CAREGIVERS */
.caregivers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:48px;}
.caregiver-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);transition:all .3s;position:relative;}
.caregiver-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);}
.caregiver-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;}
.caregiver-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(21,38,32,.9) 0%,transparent 50%);opacity:0;transition:opacity .3s;}
.caregiver-card:hover .caregiver-overlay{opacity:1;}
.caregiver-info{position:absolute;bottom:0;left:0;right:0;padding:20px;transform:translateY(8px);opacity:0;transition:all .3s;}
.caregiver-card:hover .caregiver-info{transform:none;opacity:1;}
.caregiver-body{padding:16px 18px;}
.caregiver-name{font-family:var(--font-head);font-size:16px;font-weight:700;margin-bottom:4px;}
.caregiver-spec{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-lt);padding:3px 10px;border-radius:100px;display:inline-block;margin-bottom:6px;}
.caregiver-exp{font-size:13px;color:var(--text-muted);font-weight:400;}
.caregiver-overlay-name{font-family:var(--font-head);font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;}
.caregiver-overlay-spec{font-size:13px;color:var(--accent-md);margin-bottom:10px;}
.caregiver-overlay-detail{font-size:13px;color:rgba(255,255,255,.75);line-height:1.5;}

/* HOW */
.how-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:56px;}
.how-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:28px 22px;text-align:center;box-shadow:var(--shadow);transition:all .3s;position:relative;}
.how-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--accent-md);}
.how-connector{position:absolute;top:38px;right:-30px;width:40px;height:2px;background:var(--accent-md);z-index:2;}
.how-num-circle{width:52px;height:52px;border-radius:50%;background:var(--accent-lt);border:2px solid var(--accent-md);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.how-num-circle span{font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--accent);}
.how-title{font-size:15px;font-weight:700;margin-bottom:8px;}
.how-desc{font-size:13px;font-weight:300;color:var(--text-muted);line-height:1.6;}
.how-note{text-align:center;margin-top:36px;font-size:15px;font-style:italic;color:var(--text-muted);}
.how-note em{color:var(--accent);font-style:normal;font-weight:700;}

/* REVIEWS */
.reviews-photo-row{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:20px;margin-top:48px;align-items:start;}
.review-featured{background:var(--white);border:1px solid var(--border);border-radius:var(--rxl);overflow:hidden;box-shadow:var(--shadow-lg);}
.review-featured-img{width:100%;height:260px;object-fit:cover;}
.review-featured-body{padding:24px 26px;}
.review-secondary{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px;margin-bottom:20px;}
.review-stars{display:flex;gap:3px;}
.star{width:14px;height:14px;fill:#F59E0B;}
.review-text{font-size:14px;font-weight:300;color:var(--text-muted);line-height:1.7;}
.review-author{display:flex;align-items:center;gap:10px;}
.review-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-lt);border:1.5px solid var(--accent-md);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0;}
.review-name{font-size:14px;font-weight:700;}
.review-age{font-size:12px;color:var(--text-dim);}

/* STATS */
.stats-wrap{position:relative;border-radius:var(--rxl);overflow:hidden;box-shadow:var(--shadow-lg);margin-top:56px;}
.stats-img{width:100%;height:400px;object-fit:cover;object-position:center 30%;display:block;}
.stats-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(10,80,55,.93) 0%,rgba(10,122,95,.82) 100%);}
.stats-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;}
.stats-title-wrap{text-align:center;margin-bottom:44px;}
.stats-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:12px;}
.stats-title{font-family:var(--font-head);font-size:clamp(22px,3vw,36px);font-weight:800;color:#fff;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:100%;max-width:800px;}
.stat-item{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);padding:28px 20px;text-align:center;border:1px solid rgba(255,255,255,.15);border-radius:var(--r);}
.stat-val{font-family:var(--font-head);font-size:44px;font-weight:800;color:#fff;line-height:1;margin-bottom:8px;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.stat-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);line-height:1.4;}

/* FAQ */
.faq-wrap{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;margin-top:56px;}
.faq-img-wrap{border-radius:var(--rxl);overflow:hidden;box-shadow:var(--shadow-lg);position:sticky;top:100px;}
.faq-img-wrap img{width:100%;aspect-ratio:4/5;object-fit:cover;}
.faq-list{display:flex;flex-direction:column;}
.faq-item{border-bottom:1px solid var(--border);}
.faq-q{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:20px 0;cursor:pointer;font-size:15px;font-weight:600;transition:color .2s;user-select:none;}
.faq-q:hover,.faq-q.open{color:var(--accent);}
.faq-icon{width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform .3s,background .3s;}
.faq-q.open .faq-icon{transform:rotate(45deg);background:var(--accent-lt);border-color:var(--accent-md);}
.faq-icon svg{width:10px;height:10px;stroke:var(--accent);fill:none;stroke-width:2.5;}
.faq-a{display:none;padding:0 0 18px;font-size:14px;font-weight:300;color:var(--text-muted);line-height:1.75;}
.faq-a.open{display:block;}

/* CTA */
.cta-section{padding:0 0 96px;}
.cta-inner{background:var(--text);border-radius:var(--rxl);display:grid;grid-template-columns:1fr 1fr;overflow:hidden;box-shadow:var(--shadow-lg);min-height:440px;}
.cta-left{padding:60px 52px;display:flex;flex-direction:column;justify-content:center;}
.cta-overline{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent-md);margin-bottom:16px;}
.cta-title{font-family:var(--font-head);font-size:clamp(26px,3vw,40px);font-weight:800;color:#fff;margin-bottom:16px;line-height:1.15;}
.cta-title span{color:var(--accent2);}
.cta-sub{font-size:16px;font-weight:300;color:rgba(255,255,255,.55);line-height:1.75;margin-bottom:34px;}
.cta-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.btn-cta-primary{background:var(--accent);color:#fff;}
.btn-cta-primary:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(10,122,95,.4);}
.btn-cta-outline{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);}
.btn-cta-outline:hover{background:rgba(255,255,255,.14);}
.cta-note{font-size:13px;color:rgba(255,255,255,.3);}
.cta-note span{color:rgba(255,255,255,.45);}
.cta-right{position:relative;overflow:hidden;}
.cta-right img{width:100%;height:100%;object-fit:cover;}
.cta-right-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(21,38,32,.45),transparent);}

/* FOOTER */
footer{background:var(--text);border-top:1px solid rgba(255,255,255,.07);padding:48px 0 32px;}
.footer-inner{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:48px;margin-bottom:40px;}
.footer-logo{font-family:var(--font-head);font-size:22px;font-weight:800;color:#fff;margin-bottom:12px;}
.footer-logo span{color:var(--accent2);}
.footer-desc{font-size:14px;font-weight:300;color:rgba(255,255,255,.45);line-height:1.7;}
.footer-col-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:16px;}
.footer-col a,.footer-col p{font-size:14px;color:rgba(255,255,255,.55);line-height:2.2;display:block;transition:color .2s;}
.footer-col a:hover{color:var(--accent2);}
.footer-bottom{border-top:1px solid rgba(255,255,255,.07);padding-top:24px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.footer-copy{font-size:12px;color:rgba(255,255,255,.25);}

/* FLOATING BUTTON */
.floating-btn{position:fixed;bottom:32px;right:32px;z-index:200;display:flex;flex-direction:column;gap:12px;align-items:flex-end;}
.float-call{display:flex;align-items:center;gap:10px;background:var(--accent);color:#fff;padding:13px 20px;border-radius:100px;font-size:14px;font-weight:700;font-family:var(--font-body);box-shadow:0 8px 32px rgba(10,122,95,.35);transition:all .25s;border:none;cursor:pointer;white-space:nowrap;}
.float-call:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(10,122,95,.45);}
.float-call svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;}
.float-pulse{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(10,122,95,.4);cursor:pointer;border:none;position:relative;transition:all .25s;}
.float-pulse::before{content:\'\';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--accent);animation:ping 2s ease-out infinite;opacity:.5;}
@keyframes ping{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}
.float-pulse:hover{background:var(--accent2);transform:scale(1.08);}
.float-pulse svg{width:22px;height:22px;fill:#fff;}

/* ENGAGEMENT ANIMATIONS */

/* Enhanced reveal */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1);}
.reveal.visible{opacity:1;transform:none;}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}

/* Card tilt effect */
.pain-card,.service-card,.how-card{
  transform-style:preserve-3d;
  will-change:transform;
}

/* Shimmer on CTA buttons */
.btn-primary,.btn-urgent,.float-call{
  position:relative;
  overflow:hidden;
}
.btn-primary::after,.btn-urgent::after,.float-call::after{
  content:'';
  position:absolute;
  top:-50%;left:-80%;
  width:60%;height:200%;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.22) 50%,transparent 60%);
  transform:skewX(-20deg);
  animation:shimmer 3.5s ease-in-out infinite;
}
@keyframes shimmer{
  0%{left:-80%}
  60%,100%{left:130%}
}

/* Pulse ring on phone dot */
.phone-dot{
  box-shadow:0 0 0 0 rgba(10,122,95,.5);
  animation:phonePulse 2.5s ease infinite;
}
@keyframes phonePulse{
  0%{box-shadow:0 0 0 0 rgba(10,122,95,.5);}
  70%{box-shadow:0 0 0 8px rgba(10,122,95,0);}
  100%{box-shadow:0 0 0 0 rgba(10,122,95,0);}
}

/* Quiz option pop animation */
.quiz-option{
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
.quiz-option.selected{
  transform:scale(1.02);
  box-shadow:0 4px 20px rgba(10,122,95,.15);
}

/* Stat item count-up glow */
.stat-item{transition:background .3s,box-shadow .3s;}
.stat-item:hover{background:rgba(255,255,255,.18);box-shadow:0 0 30px rgba(10,148,112,.2);}

/* Section number large gradient */
.pain-num{
  background: linear-gradient(135deg, var(--accent-md) 0%, var(--accent-lt) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-size:70px;
}

/* Floating badge subtle bob */
.hero-stat-chip{
  animation:bobUp 4s ease-in-out infinite;
}
@keyframes bobUp{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* Hero card subtle entrance */
.hero-img-card{
  animation:slideUp .9s cubic-bezier(.16,1,.3,1) .6s both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:none;}
}

/* Progress bar animated glow */
.quiz-progress-fill{
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));
  background-size:200% 100%;
  animation:progressGlow 2s linear infinite;
}
@keyframes progressGlow{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}

/* FAQ answer smooth slide */
.faq-a{
  display:block !important;
  max-height:0;
  overflow:hidden;
  transition:max-height .4s cubic-bezier(.16,1,.3,1), padding .4s ease, opacity .3s ease;
  padding:0;
  opacity:0;
}
.faq-a.open{
  max-height:200px;
  padding:0 0 18px;
  opacity:1;
}

/* Caregiver card scale */
.caregiver-card{
  transition:transform .4s cubic-bezier(.34,1.4,.64,1), box-shadow .4s ease;
}
.caregiver-card:hover{
  transform:translateY(-10px) scale(1.015);
}

/* Scroll progress indicator */
.scroll-progress{
  position:fixed;top:0;left:0;height:3px;z-index:999;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;transition:width .1s linear;
  border-radius:0 2px 2px 0;
}

/* Light rays in hero */
@keyframes rayRotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}


.section-alt{
  background: linear-gradient(160deg, var(--bg2) 0%, #edf7f3 50%, var(--bg2) 100%);
  position: relative;
}
.section-alt::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background: radial-gradient(ellipse 70% 50% at 80% 20%, rgba(10,122,95,0.06) 0%, transparent 60%),
              radial-gradient(ellipse 60% 40% at 20% 80%, rgba(10,148,112,0.05) 0%, transparent 60%);
}
.section:not(.section-alt):not(.quiz-section){
  background: var(--bg);
  position: relative;
}
.section:not(.section-alt):not(.quiz-section)::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background: radial-gradient(ellipse 80% 60% at 10% 30%, rgba(10,122,95,0.04) 0%, transparent 55%),
              radial-gradient(ellipse 50% 70% at 90% 70%, rgba(10,122,95,0.03) 0%, transparent 55%);
}

/* HERO AMBIENT */
.hero{
  background: linear-gradient(175deg, #F7F9F8 0%, #EFF7F3 40%, #F7F9F8 100%);
  position: relative;
}
.hero::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 80% at 90% 20%, rgba(10,122,95,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 5% 80%, rgba(10,148,112,0.06) 0%, transparent 55%);
}

/* AMBIENT ORBS */
.hero-orbs{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.hero-orb{position:absolute;border-radius:50%;filter:blur(60px);animation:orbFloat 12s ease-in-out infinite;}
.hero-orb-1{width:320px;height:320px;background:rgba(10,122,95,0.07);top:-80px;right:10%;animation-delay:0s;}
.hero-orb-2{width:200px;height:200px;background:rgba(10,148,112,0.06);bottom:20%;left:5%;animation-delay:-4s;}
.hero-orb-3{width:160px;height:160px;background:rgba(10,122,95,0.05);top:40%;right:20%;animation-delay:-8s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(20px,-30px) scale(1.05);}
  66%{transform:translate(-15px,20px) scale(0.95);}
}

/* CARD PREMIUM GLOW */
.pain-card,.service-card,.caregiver-card,.how-card{
  background: linear-gradient(145deg, #ffffff 0%, #f8fcfa 100%);
}
.pain-card:hover,.service-card:hover,.how-card:hover{
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(10,122,95,0.1), 0 0 40px rgba(10,122,95,0.07);
}

/* QUIZ BOX PREMIUM */
.quiz-box{
  background: linear-gradient(160deg, #ffffff 0%, #f9fdfc 100%);
  border: 1px solid rgba(10,122,95,0.1);
}

/* STATS OVERLAY PREMIUM */
.stats-overlay{
  background: linear-gradient(135deg,rgba(8,60,42,.95) 0%,rgba(10,122,95,.85) 60%, rgba(12,148,112,.75) 100%);
}

/* CTA PREMIUM */
.cta-inner{
  background: linear-gradient(135deg, #152620 0%, #1a3329 50%, #0e2a22 100%);
  position: relative;
  overflow: hidden;
}
.cta-inner::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background: radial-gradient(ellipse 60% 80% at 5% 50%, rgba(10,122,95,0.25) 0%, transparent 60%);
}

/* FOOTER PREMIUM */
footer{
  background: linear-gradient(175deg, #152620 0%, #0e1f1a 100%);
  position: relative;
}
footer::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(10,122,95,0.12) 0%, transparent 50%);
}

/* SECURITY SECTION */
#security{
  background: linear-gradient(170deg, var(--bg) 0%, #eef6f2 60%, var(--bg) 100%);
}

/* GRADIENT DIVIDER */
.gradient-divider{
  height:1px;background:linear-gradient(90deg,transparent,var(--accent-md),transparent);
  margin:0;border:none;opacity:.5;
}


@media(max-width:960px){
  .hero-inner,.security-inner,.faq-wrap{grid-template-columns:1fr;}
  .hero-image-wrap{aspect-ratio:16/9;}
  .hero-stat-chip{display:none;}
  .how-grid{grid-template-columns:1fr 1fr;}
  .how-connector{display:none;}
  .reviews-photo-row{grid-template-columns:1fr 1fr;}
  .review-featured{grid-column:span 2;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .cta-inner{grid-template-columns:1fr;}
  .cta-right{height:280px;}
  .footer-inner{grid-template-columns:1fr 1fr;}
  .pain-grid{grid-template-columns:1fr 1fr;}
  .caregivers-grid{grid-template-columns:1fr 1fr;}
  .calc-inner{grid-template-columns:1fr;}
  .calc-right{position:static;}
}
@media(max-width:600px){
  .container{padding:0 20px;}
  .pain-grid,.how-grid,.reviews-photo-row,.caregivers-grid{grid-template-columns:1fr;}
  .review-featured{grid-column:span 1;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .footer-inner{grid-template-columns:1fr;}
  .nav-links{display:none;}
  .hero-btns,.cta-btns{flex-direction:column;}
  .quiz-options{grid-template-columns:1fr;}
  .floating-btn{bottom:20px;right:20px;}
  .modal-box{padding:28px 20px;}
  .form-row{grid-template-columns:1fr;}
  .calc-result-price{font-size:36px;}
}
@media(max-width:768px){
  .mobile-sticky{display:flex;}
  body{padding-bottom:72px;}
  .floating-btn{display:none;}
}

/* ═══════════════════════════════════════
   MODAL FORM
═══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(10,26,21,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s ease;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-box{background:#fff;border-radius:var(--rxl);padding:48px 44px;max-width:520px;width:100%;position:relative;box-shadow:0 32px 80px rgba(10,26,21,.25);transform:translateY(24px) scale(.97);transition:transform .35s cubic-bezier(.16,1,.3,1);}
.modal-overlay.open .modal-box{transform:none;}
.modal-close{position:absolute;top:20px;right:20px;width:34px;height:34px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text-muted);transition:all .2s;line-height:1;}
.modal-close:hover{background:var(--accent-lt);color:var(--accent);border-color:var(--accent-md);}
.modal-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.modal-eyebrow::before{content:'';width:16px;height:2px;background:var(--accent);border-radius:2px;}
.modal-title{font-family:var(--font-head);font-size:26px;font-weight:800;margin-bottom:6px;line-height:1.2;}
.modal-sub{font-size:14px;font-weight:300;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.6px;margin-bottom:6px;text-transform:uppercase;}
.form-input,.form-select{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--r);font-family:var(--font-body);font-size:15px;color:var(--text);background:var(--bg);transition:border-color .2s,box-shadow .2s;outline:none;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,122,95,.1);background:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-submit{width:100%;padding:15px;margin-top:6px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--font-head);font-size:16px;font-weight:700;cursor:pointer;transition:all .22s ease;position:relative;overflow:hidden;}
.form-submit:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(10,122,95,.3);}
.form-submit::after{content:'';position:absolute;top:-50%;left:-80%;width:60%;height:200%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.22) 50%,transparent 60%);transform:skewX(-20deg);animation:shimmer 3.5s ease-in-out infinite;}
.form-note{text-align:center;font-size:12px;color:var(--text-dim);margin-top:10px;line-height:1.5;}
.form-body{transition:opacity .3s;}
.form-success{display:none;text-align:center;padding:16px 0;}
.form-success.show{display:block;}
.form-success-icon{width:64px;height:64px;border-radius:50%;background:var(--accent-lt);border:2px solid var(--accent-md);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.form-success-icon svg{width:28px;height:28px;stroke:var(--accent);fill:none;stroke-width:2;}
.form-success-title{font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:8px;}
.form-success-sub{font-size:14px;color:var(--text-muted);line-height:1.6;}

/* ═══════════════════════════════════════
   CALCULATOR
═══════════════════════════════════════ */
.calc-section{padding:96px 0;position:relative;}
.calc-section::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 80% 30%,rgba(10,122,95,0.05) 0%,transparent 60%);}
.calc-inner{display:grid;grid-template-columns:1.15fr 1fr;gap:56px;align-items:start;margin-top:52px;}
.calc-block{margin-bottom:26px;}
.calc-block-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.calc-options{display:flex;flex-wrap:wrap;gap:8px;}
.calc-opt{padding:9px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .2s;}
.calc-opt:hover{border-color:var(--accent-md);color:var(--accent);}
.calc-opt.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.calc-slider{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--pct,50%), var(--border-dk) var(--pct,50%));outline:none;cursor:pointer;margin:10px 0 4px;}
.calc-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 2px 8px rgba(10,122,95,.3);cursor:pointer;transition:transform .2s;}
.calc-slider::-webkit-slider-thumb:hover{transform:scale(1.15);}
.calc-slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);}
.calc-slider-val{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:2px;}
.calc-right{position:sticky;top:100px;}
.calc-result-card{background:linear-gradient(145deg,var(--text) 0%,#1a3329 100%);border-radius:var(--rxl);padding:40px 36px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;}
.calc-result-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 10% 20%,rgba(10,122,95,.3) 0%,transparent 60%);pointer-events:none;}
.calc-result-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent-md);margin-bottom:20px;position:relative;}
.calc-result-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:4px;position:relative;}
.calc-price-wrap{position:relative;margin-bottom:4px;}
.calc-result-price{font-family:var(--font-head);font-size:52px;font-weight:800;color:#fff;line-height:1;transition:all .35s cubic-bezier(.16,1,.3,1);}
.calc-result-price sup{font-size:22px;vertical-align:top;margin-top:10px;display:inline-block;opacity:.7;}
.calc-result-period{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:24px;position:relative;}
.calc-breakdown{border-top:1px solid rgba(255,255,255,.1);padding-top:18px;margin-bottom:22px;position:relative;}
.calc-breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;}
.calc-breakdown-key{color:rgba(255,255,255,.4);}
.calc-breakdown-val{font-weight:600;color:rgba(255,255,255,.75);}
.calc-disclaimer{font-size:11px;color:rgba(255,255,255,.22);line-height:1.5;margin-bottom:22px;position:relative;}
.calc-cta-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.calc-cta-btn:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(10,122,95,.4);}
.calc-cta-btn::after{content:'';position:absolute;top:-50%;left:-80%;width:60%;height:200%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.18) 50%,transparent 60%);transform:skewX(-20deg);animation:shimmer 3.5s ease-in-out infinite;}
.calc-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;position:relative;}
.calc-badge{padding:4px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:100px;font-size:11px;color:rgba(255,255,255,.4);}

/* ═══════════════════════════════════════
   WHATSAPP / TELEGRAM FLOATING
═══════════════════════════════════════ */
.floating-btn{position:fixed;bottom:32px;right:32px;z-index:200;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
.float-messenger-group{display:flex;flex-direction:column;gap:8px;align-items:flex-end;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .3s cubic-bezier(.16,1,.3,1);}
.float-messenger-group.open{opacity:1;pointer-events:auto;transform:none;}
.float-wa{display:flex;align-items:center;gap:9px;background:#25D366;color:#fff;padding:11px 18px;border-radius:100px;font-size:14px;font-weight:700;font-family:var(--font-body);box-shadow:0 6px 24px rgba(37,211,102,.35);transition:all .25s;border:none;cursor:pointer;white-space:nowrap;text-decoration:none;}
.float-wa:hover{background:#20bc5a;transform:translateY(-2px);}
.float-wa svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;}
.float-tg{display:flex;align-items:center;gap:9px;background:#2AABEE;color:#fff;padding:11px 18px;border-radius:100px;font-size:14px;font-weight:700;font-family:var(--font-body);box-shadow:0 6px 24px rgba(42,171,238,.3);transition:all .25s;border:none;cursor:pointer;white-space:nowrap;text-decoration:none;}
.float-tg:hover{background:#1e9ed6;transform:translateY(-2px);}
.float-tg svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;}
.float-call{display:flex;align-items:center;gap:9px;background:var(--accent);color:#fff;padding:11px 18px;border-radius:100px;font-size:14px;font-weight:700;font-family:var(--font-body);box-shadow:0 6px 24px rgba(10,122,95,.3);transition:all .25s;border:none;cursor:pointer;white-space:nowrap;text-decoration:none;}
.float-call:hover{background:var(--accent2);transform:translateY(-2px);}
.float-call svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;}
.float-toggle{width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(10,122,95,.4);transition:all .25s;position:relative;font-size:20px;line-height:1;}
.float-toggle::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--accent);animation:ping 2.5s ease-out infinite;opacity:.4;}
.float-toggle:hover{background:var(--accent2);transform:scale(1.08);}
.float-toggle-x{display:none;}.float-toggle.open .float-toggle-chat{display:none;}.float-toggle.open .float-toggle-x{display:block;}

/* ═══════════════════════════════════════
   MOBILE STICKY BAR
═══════════════════════════════════════ */
.mobile-sticky{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);padding:10px 14px;box-shadow:0 -4px 24px rgba(10,26,21,.1);gap:8px;align-items:center;}
.msb{flex:1;padding:12px 6px;border-radius:var(--r);font-family:var(--font-body);font-size:13px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;text-decoration:none;}
.msb svg{width:16px;height:16px;fill:currentColor;flex-shrink:0;}
.msb-call{background:var(--accent);color:#fff;}
.msb-wa{background:#25D366;color:#fff;}
.msb-form{background:var(--accent-lt);color:var(--accent);border:1.5px solid var(--accent-md) !important;}

</head>

      <p class="form-success-sub">Мы перезвоним вам в течение 30 минут в рабочее время.<br>Если срочно — звоните напрямую: <a href="tel:+74951234567" style="color:var(--accent);font-weight:700;">+7 (495) XXX-XX-XX</a></p>

<!-- QUIZ -->
<section class="quiz-section" id="quiz">
  <div class="container">
    <div class="quiz-header reveal">
      <div class="quiz-eyebrow">Интерактивный тест</div>
      <h2 class="quiz-title">Определите уровень<br>необходимой помощи</h2>
      <p class="quiz-subtitle">6 вопросов — и вы поймёте, какой формат ухода подойдёт вашему родителю, и на что обратить внимание врачу.</p>
    </div>
    <div class="quiz-box reveal d2">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-top">
          <span class="quiz-progress-label">Прогресс</span>
          <span class="quiz-progress-count" id="stepCount">Вопрос 1 из 6</span>
        </div>
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progressFill" style="width:16%"></div></div>
      </div>

      <!-- Step 1 -->
      <div class="quiz-step active" data-step="1">
        <div class="quiz-question">Как ваш родитель передвигается?</div>
        <div class="quiz-hint">Оцените повседневную ситуацию, не в лучший день.</div>
        <div class="quiz-options">
          <button class="quiz-option" data-value="0"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M10 9l-2 4h4l1 6M14 9l2 2-2 2M8 13l-1 4"/></svg></span>Самостоятельно, без ограничений</button>
          <button class="quiz-option" data-value="1"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M12 7v5l2 3M10 11l-3 3 1 4M14 19l1-4"/><line x1="9" y1="17" x2="7" y2="21"/></svg></span>С тростью или поддержкой</button>
          <button class="quiz-option" data-value="2"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="6" r="2"/><path d="M3 12h5l1 1v6M5 12l-1-3h16l-1 3M19 12v7M7 18h10M12 10v3"/></svg></span>На ходунках или в коляске</button>
          <button class="quiz-option" data-value="3"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="8" rx="2"/><path d="M3 15h18M7 11V9a5 5 0 0110 0v2"/><circle cx="7" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg></span>Не встаёт с кровати</button>
        </div>
        <div class="quiz-nav">
          <span></span>
          <button class="quiz-btn-next" id="next1" disabled>Далее <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg></button>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="quiz-step" data-step="2">
        <div class="quiz-question">Как обстоит ситуация с памятью?</div>
        <div class="quiz-hint">Когнитивные изменения часто незаметны постепенно.</div>
        <div class="quiz-options">
          <button class="quiz-option" data-value="0"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M12 2a9 9 0 110 18A9 9 0 0112 2z"/><path d="M9 9h.01M15 9h.01M9 14s1 2 3 2 3-2 3-2"/></svg></span>Память в порядке</button>
          <button class="quiz-option" data-value="1"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M12 2a9 9 0 110 18A9 9 0 0112 2z"/><path d="M12 8v4M12 16h.01"/></svg></span>Забывает мелочи, но справляется</button>
          <button class="quiz-option" data-value="2"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M12 2a9 9 0 110 18A9 9 0 0112 2z"/><path d="M9.5 9.5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5c0 1.5-1.5 2-2.5 3M12 16h.01"/></svg></span>Часто путается, теряется</button>
          <button class="quiz-option" data-value="3"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M12 2a9 9 0 110 18A9 9 0 0112 2z"/><path d="M8 10l2 2-2 2M16 10l-2 2 2 2M10 16s.5 1 2 1 2-1 2-1"/></svg></span>Не узнаёт близких, дезориентирован</button>
        </div>
        <div class="quiz-nav">
          <button class="quiz-btn-back" id="back2">← Назад</button>
          <button class="quiz-btn-next" id="next2" disabled>Далее <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg></button>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="quiz-step" data-step="3">
        <div class="quiz-question">Может ли самостоятельно есть и готовить?</div>
        <div class="quiz-hint">Питание — базовая потребность и важный показатель.</div>
        <div class="quiz-options">
          <button class="quiz-option" data-value="0"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M3 11l2-8h14l2 8M3 11h18M3 11v8a1 1 0 001 1h16a1 1 0 001-1v-8"/><path d="M12 8V4M9 4h6"/></svg></span>Готовит и ест самостоятельно</button>
          <button class="quiz-option" data-value="1"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M5 3v18M5 8c3 0 5-2 8-2s5 2 8 2"/><path d="M19 11v8M15 15h4"/></svg></span>Ест сам, с готовкой помогаем</button>
          <button class="quiz-option" data-value="2"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M12 20c-4.4 0-8-1.8-8-4v-2c0-2.2 3.6-4 8-4s8 1.8 8 4v2c0 2.2-3.6 4-8 4z"/><path d="M12 10V7M9 7h6M7 14l2 1M17 14l-2 1"/></svg></span>Нужна помощь и с тем, и с другим</button>
          <button class="quiz-option" data-value="3"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="10" rx="2"/><path d="M8 8V6a4 4 0 018 0v2M12 12v2M10 14h4"/></svg></span>Нужна постоянная помощь с кормлением</button>
        </div>
        <div class="quiz-nav">
          <button class="quiz-btn-back" id="back3">← Назад</button>
          <button class="quiz-btn-next" id="next3" disabled>Далее <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg></button>
        </div>
      </div>

      <!-- Step 4 -->
      <div class="quiz-step" data-step="4">
        <div class="quiz-question">Принимает ли регулярные лекарства?</div>
        <div class="quiz-hint">Контроль приёма лекарств — частая причина обращений.</div>
        <div class="quiz-options">
          <button class="quiz-option" data-value="0"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="7,12 10,15 17,9"/></svg></span>Нет лекарств или справляется сам</button>
          <button class="quiz-option" data-value="1"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,14"/></svg></span>Нужны напоминания и контроль</button>
          <button class="quiz-option" data-value="2"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M10 3h4v4l3 3-3 3v4h-4v-4L7 10l3-3z"/><line x1="12" y1="10" x2="12" y2="14"/><line x1="10" y1="12" x2="14" y2="12"/></svg></span>Нужна помощь с инъекциями</button>
          <button class="quiz-option" data-value="3"><span class="quiz-option-icon"><svg viewBox="0 0 24 24"><path d="M12 3l8 4v5c0 4.4-3.4 8.5-8 9.5C7.4 20.5 4 16.4 4 12V7z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="15" x2="12" y2="16"/></svg></span>Серьёзная медицинская потребность</button>
        </div>

<script>
// ── REVEAL ──
const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting){e.target.classList.add("visible");obs.unobserve(e.target);} }), {threshold:.1});
document.querySelectorAll(".reveal").forEach(el => obs.observe(el));

// ── FAQ ──
document.querySelectorAll(".faq-q").forEach(q => {
  const toggle = () => {
    const open = q.classList.contains("open");
    document.querySelectorAll(".faq-q").forEach(x=>{x.classList.remove("open");x.setAttribute("aria-expanded","false");});
    document.querySelectorAll(".faq-a").forEach(x=>x.classList.remove("open"));
    if(!open){q.classList.add("open");q.setAttribute("aria-expanded","true");q.nextElementSibling.classList.add("open");}
  };
  q.addEventListener("click", toggle);
  q.addEventListener("keydown", e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle();}});
});

// ── COUNTER ──
const counterObs = new IntersectionObserver(es => {
  es.forEach(e => {
    if(e.isIntersecting){
      const el = e.target, target = +el.dataset.target, suffix = el.dataset.suffix||"", dur = 1600;
      const start = Date.now();
      const tick = () => {
        const p = Math.min((Date.now()-start)/dur, 1);
        const ease = 1-Math.pow(1-p,3);
        el.textContent = Math.round(ease*target) + suffix;
        if(p<1) requestAnimationFrame(tick);
      };
      tick(); counterObs.unobserve(el);
    }
  });
},{threshold:.5});
document.querySelectorAll(".counter").forEach(el => counterObs.observe(el));

// ── QUIZ ──
const answers = {};
let currentStep = 1;
const totalSteps = 6;

function updateProgress(){
  const pct = (currentStep/totalSteps)*100;
  document.getElementById("progressFill").style.width = pct+"%";
  document.getElementById("stepCount").textContent = "Вопрос "+currentStep+" из "+totalSteps;
}

function goTo(step){
  document.querySelectorAll(".quiz-step").forEach(s=>s.classList.remove("active"));
  document.querySelector("[data-step=\""+step+"\"]").classList.add("active");
  currentStep = step;
  updateProgress();
}

function showResult(){
  document.querySelectorAll(".quiz-step").forEach(s=>s.classList.remove("active"));
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("stepCount").textContent = "Результат";
  const score = Object.values(answers).reduce((a,b)=>a+b,0);
  const r = document.getElementById("quizResult");
  r.classList.add("active");
  const icon = document.getElementById("resultIcon");
  const level = document.getElementById("resultLevel");
  const desc = document.getElementById("resultDesc");
  const tags = document.getElementById("resultTags");
  const diag = document.getElementById("resultDiag");

  const levels = [
    {max:3, color:"#E6F5F0", iconBg:"#B3DDD2", emoji:"🌱", title:"Минимальная помощь",
     desc:"Ваш родитель достаточно самостоятелен. Рекомендуем сиделку 1–3 часа в день: для компании, помощи по дому и контроля самочувствия.",
     tags:["от 1 часа", "несколько раз в неделю"],
     tagColors:["#0A7A5F","#0A7A5F"],
     diag:"На основе ваших ответов: серьёзных признаков нарушений не выявлено. Рекомендуем регулярный визит к терапевту для профилактики и контроля хронических заболеваний."},
    {max:7, color:"#FFF8E6", iconBg:"#FFE5A0", emoji:"🌿", title:"Регулярная помощь",
     desc:"Родителю нужна стабильная поддержка. Оптимальный формат — дневная сиделка на несколько часов ежедневно или через день.",
     tags:["дневной уход", "ежедневно"],
     tagColors:["#B07D00","#B07D00"],
     diag:"Обратите внимание: признаки, которые вы описали, могут указывать на начальные стадии возрастных изменений. Рекомендуем консультацию невролога и гериатра."},
    {max:12, color:"#FFF0E6", iconBg:"#FFD0A8", emoji:"🌻", title:"Интенсивный уход",
     desc:"Ситуация требует постоянного присутствия. Рекомендуем дневную сиделку на полный день или сменный режим.",
     tags:["полный день", "постоянный уход"],
     tagColors:["#B05000","#B05000"],
     diag:"На основе ваших ответов: возможные состояния — умеренные когнитивные нарушения, последствия инсульта или ОНМК, болезнь Паркинсона на ранних стадиях. Необходима консультация невролога."},
    {max:99, color:"#FFF0F0", iconBg:"#FFD0D0", emoji:"🏥", title:"Круглосуточный уход",
     desc:"Вашему родителю необходимо постоянное профессиональное присутствие. Рекомендуем сиделку с проживанием или работу посменно.",
     tags:["круглосуточно", "с проживанием", "срочно"],
     tagColors:["#B00000","#B00000","#B00000"],
     diag:"На основе ваших ответов: высокий риск, характерный для деменции (болезнь Альцгеймера), тяжёлых последствий инсульта, лежачего состояния или перелома шейки бедра. Рекомендуем немедленную консультацию гериатра и невролога."}
  ];

  const res = levels.find(l => score <= l.max);
  icon.style.background = res.iconBg; icon.textContent = res.emoji;
  level.textContent = res.title;
  desc.textContent = res.desc;
  tags.innerHTML = res.tags.map((t,i)=>`<span class="result-tag" style="background:${res.tagColors[i]}22;color:${res.tagColors[i]}">${t}</span>`).join("");
  diag.innerHTML = "<strong style=\"color:var(--text);display:block;margin-bottom:6px;\">⚕️ Медицинская информация:</strong>" + res.diag;
}

// Attach option listeners
document.querySelectorAll(".quiz-step").forEach(step => {
  const stepNum = +step.dataset.step;
  step.querySelectorAll(".quiz-option").forEach(opt => {
    opt.addEventListener("click", () => {
      step.querySelectorAll(".quiz-option").forEach(o=>o.classList.remove("selected"));
      opt.classList.add("selected");
      answers[stepNum] = +opt.dataset.value;
      const nextBtn = step.querySelector(".quiz-btn-next");
      if(nextBtn) nextBtn.disabled = false;
    });
  });
});

// Next/Back
for(let i=1;i<=totalSteps;i++){
  const nb = document.getElementById("next"+i);
  const bb = document.getElementById("back"+i);
  if(nb) nb.addEventListener("click", ()=>{ if(i<totalSteps) goTo(i+1); else showResult(); });
  if(bb) bb.addEventListener("click", ()=>goTo(i-1));
}

document.getElementById("resetQuiz").addEventListener("click", ()=>{
  Object.keys(answers).forEach(k=>delete answers[k]);
  document.getElementById("quizResult").classList.remove("active");
  document.querySelectorAll(".quiz-option").forEach(o=>o.classList.remove("selected"));
  document.querySelectorAll(".quiz-btn-next").forEach(b=>b.disabled=true);
  goTo(1);
});

updateProgress();

// ── SCROLL PROGRESS ──
const progressBar = document.getElementById("scrollProgress");
window.addEventListener("scroll", () => {
  const total = document.body.scrollHeight - window.innerHeight;
  progressBar.style.width = (window.scrollY / total * 100) + "%";
}, {passive:true});

// ── CARD TILT (3D hover) ──
document.querySelectorAll(".pain-card, .how-card, .service-card").forEach(card => {
  card.addEventListener("mousemove", e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    card.style.transform = `perspective(700px) rotateY(${x*7}deg) rotateX(${-y*7}deg) translateY(-4px)`;
  });
  card.addEventListener("mouseleave", () => {
    card.style.transition = "transform .5s cubic-bezier(.16,1,.3,1), box-shadow .3s ease";
    card.style.transform = "";
    setTimeout(() => card.style.transition = "", 500);
  });
});

// ── HERO PARALLAX ──
const heroImg = document.querySelector(".hero-image-wrap img");
if(heroImg){
  window.addEventListener("scroll", () => {
    heroImg.style.transform = `translateY(${window.scrollY * 0.18}px)`;
  }, {passive:true});
}

// ── CAREGIVER CARDS stagger ──
document.querySelectorAll(".caregiver-card").forEach((card, i) => {
  card.style.transitionDelay = (i * 0.08) + "s";
});

// ── FLOATING TOGGLE ──
const floatToggle = document.getElementById("floatToggle");
const messengerGroup = document.getElementById("messengerGroup");
floatToggle.addEventListener("click", () => {
  const isOpen = messengerGroup.classList.toggle("open");
  floatToggle.classList.toggle("open", isOpen);
});
document.addEventListener("click", e => {
  if(!e.target.closest(".floating-btn")) {
    messengerGroup.classList.remove("open");
    floatToggle.classList.remove("open");
  }
});

// ── FLOATING BUTTON hide on hero ──
const floatBtn = document.getElementById("floatingBtn");
const heroEl = document.querySelector(".hero");
window.addEventListener("scroll", ()=>{
  const heroBottom = heroEl.getBoundingClientRect().bottom;
  floatBtn.style.opacity = heroBottom < 0 ? "1" : "0";
  floatBtn.style.pointerEvents = heroBottom < 0 ? "auto" : "none";
}, {passive:true});
floatBtn.style.opacity = "0";
floatBtn.style.pointerEvents = "none";
floatBtn.style.transition = "opacity .3s";

// ── MODAL ──
const modalOverlay = document.getElementById("modalOverlay");
function openModal(){ modalOverlay.classList.add("open"); document.body.style.overflow="hidden"; }
function closeModal(){ modalOverlay.classList.remove("open"); document.body.style.overflow=""; }
document.querySelectorAll(".open-modal").forEach(el => el.addEventListener("click", e=>{ e.preventDefault(); openModal(); }));
document.getElementById("modalClose").addEventListener("click", closeModal);
modalOverlay.addEventListener("click", e=>{ if(e.target===modalOverlay) closeModal(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

// Form phone mask
const fPhone = document.getElementById("fPhone");
if(fPhone){
  fPhone.addEventListener("input", function(){
    let v = this.value.replace(/\D/g,"");
    if(v.startsWith("8")) v = "7"+v.slice(1);
    if(!v.startsWith("7")) v = "7"+v;
    v = v.slice(0,11);
    let out = "+7";
    if(v.length>1) out += " ("+v.slice(1,4);
    if(v.length>=4) out += ") "+v.slice(4,7);
    if(v.length>=7) out += "-"+v.slice(7,9);
    if(v.length>=9) out += "-"+v.slice(9,11);
    this.value = out;
  });
}

// Form submit
document.getElementById("formSubmit").addEventListener("click", () => {
  const name = document.getElementById("fName").value.trim();
  const phone = document.getElementById("fPhone").value.trim();
  if(!name){ document.getElementById("fName").focus(); return; }
  if(phone.length < 12){ document.getElementById("fPhone").focus(); return; }
  document.getElementById("formBody").style.opacity = "0";
  setTimeout(() => {
    document.getElementById("formBody").style.display = "none";
    document.getElementById("formSuccess").classList.add("show");
  }, 300);
  setTimeout(() => { closeModal(); document.getElementById("formBody").style.display=""; document.getElementById("formBody").style.opacity="1"; document.getElementById("formSuccess").classList.remove("show"); }, 4500);
});

// Mobile sticky form button
document.querySelectorAll(".msb-form").forEach(b => b.addEventListener("click", e=>{ e.preventDefault(); openModal(); }));

// ── CALCULATOR ──
const rates = { hourly: 800, daily: 6500, live: 17000 };
const labels = { hourly: "Почасовой", daily: "Полный день", live: "С проживанием" };
let calcState = { type:"hourly", hours:4, days:5, districtCoef:1, extra:0 };

function calcUpdate(){
  const { type, hours, days, districtCoef, extra } = calcState;
  let dayPrice, monthPrice, rateLabel, modeLabel;

  if(type === "hourly"){
    const rate = Math.round(rates.hourly * districtCoef) + extra/hours;
    dayPrice = Math.round(rate * hours);
    monthPrice = Math.round(dayPrice * days * 4.3);
    rateLabel = Math.round(rates.hourly * districtCoef) + " ₽/час";
    modeLabel = hours + " ч × " + days + " дн/нед";
    document.getElementById("calcPeriod").textContent = "в день · при " + hours + " часах";
  } else if(type === "daily"){
    dayPrice = Math.round(rates.daily * districtCoef) + extra;
    monthPrice = Math.round(dayPrice * days * 4.3);
    rateLabel = Math.round(rates.daily * districtCoef) + " ₽/день";
    modeLabel = days + " дней в неделю";
    document.getElementById("calcPeriod").textContent = "в день · полная смена";
  } else {
    dayPrice = Math.round(rates.live * districtCoef) + extra;
    monthPrice = Math.round(dayPrice * 30);
    rateLabel = Math.round(rates.live * districtCoef) + " ₽/сутки";
    modeLabel = "24 ч, 7 дней в неделю";
    document.getElementById("calcPeriod").textContent = "в сутки · с проживанием";
  }

  const fmt = n => n.toLocaleString("ru-RU");
  document.getElementById("calcPriceNum").textContent = fmt(dayPrice);
  document.getElementById("bRate").textContent = rateLabel;
  document.getElementById("bMode").textContent = modeLabel;
  document.getElementById("bMonth").textContent = "~" + fmt(monthPrice) + " ₽";
}

// Type buttons
document.querySelectorAll("#calcType .calc-opt").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#calcType .calc-opt").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    calcState.type = btn.dataset.type;
    const show = calcState.type === "hourly";
    document.getElementById("hoursBlock").style.display = show ? "" : "none";
    document.getElementById("daysBlock").style.display = calcState.type !== "live" ? "" : "none";
    calcUpdate();
  });
});

// District buttons
document.querySelectorAll("#calcDistrict .calc-opt").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#calcDistrict .calc-opt").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    calcState.districtCoef = parseFloat(btn.dataset.coef);
    calcUpdate();
  });
});

// Extra buttons
document.querySelectorAll("#calcExtra .calc-opt").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#calcExtra .calc-opt").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    calcState.extra = parseInt(btn.dataset.extra)||0;
    calcUpdate();
  });
});

// Sliders
function updateSlider(slider){
  const min = +slider.min, max = +slider.max, val = +slider.value;
  const pct = ((val-min)/(max-min)*100).toFixed(1)+"%";
  slider.style.setProperty("--pct", pct);
}

const hoursSlider = document.getElementById("hoursSlider");
hoursSlider.addEventListener("input", () => {
  calcState.hours = +hoursSlider.value;
  document.getElementById("hoursVal").textContent = calcState.hours + " " + (calcState.hours===1?"час":calcState.hours<5?"часа":"часов");
  updateSlider(hoursSlider);
  calcUpdate();
});
updateSlider(hoursSlider);

const daysSlider = document.getElementById("daysSlider");
daysSlider.addEventListener("input", () => {
  calcState.days = +daysSlider.value;
  const d = ["","1 день","2 дня","3 дня","4 дня","5 дней","6 дней","7 дней"][calcState.days];
  document.getElementById("daysVal").textContent = d;
  updateSlider(daysSlider);
  calcUpdate();
});
updateSlider(daysSlider);

calcUpdate(); // initial render
</script>
